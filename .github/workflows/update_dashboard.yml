name: Update Dashboard

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours at :00
  workflow_dispatch:          # allows manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install requests pandas scipy numpy python-dotenv

      - name: Update match scores
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scripts/update_scores.py

      - name: Run simulation and export JSON
        run: python scripts/run_analysis_export_results.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worldcup2026.db docs/output/*.json
          git diff --staged --quiet || git commit -m "Auto-update: scores + simulation $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push